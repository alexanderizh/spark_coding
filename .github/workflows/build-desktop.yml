name: build-desktop

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/desktop/**'
      - 'packages/shared/**'
      - 'scripts/**'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/build-desktop.yml'

jobs:
  build-desktop:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_script: dist:desktop:mac
            platform: macos
          - os: windows-latest
            build_script: dist:desktop:win
            platform: windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build desktop package
        run: yarn ${{ matrix.build_script }}

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spark_coder_desktop_${{ matrix.platform }}
          path: apps/desktop/release/**
          if-no-files-found: error

  package-desktop:
    runs-on: ubuntu-latest
    needs: build-desktop
    permissions:
      contents: read
    steps:
      - name: Download platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: spark_coder_desktop_*
          path: desktop-artifacts

      - name: Create merged package
        run: tar -czf spark_coder_desktop.tar.gz -C desktop-artifacts .

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: spark_coder_desktop
          path: spark_coder_desktop.tar.gz
          if-no-files-found: error
