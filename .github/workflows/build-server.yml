name: build-server

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'apps/server/**'
      - '.github/workflows/**'

jobs:
  build-server-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image name
        id: image
        run: |
          OWNER_LC="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${OWNER_LC}/server" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build server image
        run: |
          docker build \
            -f apps/server/Dockerfile \
            -t "${{ steps.image.outputs.name }}:latest" \
            -t "${{ steps.image.outputs.name }}:${{ github.sha }}" \
            .

      - name: Push server image to GHCR
        run: |
          docker push "${{ steps.image.outputs.name }}:latest"
          docker push "${{ steps.image.outputs.name }}:${{ github.sha }}"

      - name: Export image package
        run: docker save "${{ steps.image.outputs.name }}:latest" -o server.tar

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server
          path: server.tar
          if-no-files-found: error
