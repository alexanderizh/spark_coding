name: build-admin

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'API 基础地址（反向代理目标）'
        required: false
        default: 'http://localhost:7001'
        type: string
  push:
    branches:
      - master
    paths:
      - 'apps/admin/**'
      - 'packages/**'
      - '.github/workflows/build-admin.yml'

env:
  DEFAULT_API_BASE_URL: 'http://localhost:7001'

jobs:
  build-admin-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image name
        id: image
        run: |
          OWNER_LC="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${OWNER_LC}/admin" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -p "require('./apps/admin/package.json').version" 2>/dev/null || echo "1.0.0")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set API base URL
        id: api_url
        run: |
          API_URL="${{ inputs.api_base_url || env.DEFAULT_API_BASE_URL }}"
          echo "url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "Using API_BASE_URL: $API_URL"

      - name: Build admin image
        run: |
          docker build \
            --build-arg API_BASE_URL="${{ steps.api_url.outputs.url }}" \
            -f apps/admin/Dockerfile \
            -t "${{ steps.image.outputs.name }}:latest" \
            -t "${{ steps.image.outputs.name }}:${{ github.sha }}" \
            -t "${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}" \
            .

      - name: Push admin image to GHCR
        run: |
          docker push "${{ steps.image.outputs.name }}:latest"
          docker push "${{ steps.image.outputs.name }}:${{ github.sha }}"
          docker push "${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}"

      - name: Export image package
        run: docker save "${{ steps.image.outputs.name }}:latest" -o admin.tar

      - name: Upload admin artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin
          path: admin.tar
          if-no-files-found: error

      - name: Summary
        run: |
          echo "## Admin 镜像构建完成 ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**镜像地址:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ github.repository_owner }}/admin:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ github.repository_owner }}/admin:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ github.repository_owner }}/admin:${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**API 反向代理地址:** ${{ steps.api_url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
