appId: com.sparkcoder.desktop
productName: Spark Coder
copyright: Copyright © 2024 Spark Coder

# 显式指定 electron 版本，解决 yarn workspace 下 electron-builder 无法检测版本的问题
electronVersion: "33.4.11"

directories:
  buildResources: resources
  output: release

files:
  - out/**/*
  - node_modules/**/*
  - package.json
  - .prod.env

# Rebuild native modules (node-pty) for Electron
npmRebuild: true

mac:
  target:
    - target: dmg
      arch: [arm64]
  icon: resources/icon.png
  category: public.app-category.developer-tools
  hardenedRuntime: false
  gatekeeperAssess: false

win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
