name: remote_claude_mobile
description: Remote terminal controller for Claude CLI via relay server.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # WebSocket / Socket.IO
  socket_io_client: ^2.0.3+1

  # QR scanning
  mobile_scanner: ^5.1.0

  # Terminal emulator
  xterm: ^4.0.0

  # Navigation
  go_router: ^13.2.4

  # Persistence
  shared_preferences: ^2.2.3

  # HTTP client
  dio: ^5.4.3+1

  # Permissions
  permission_handler: ^11.3.1

  # UUID generation
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
